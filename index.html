<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/renderer/src/assets/forart-logo.svg" />
    <title>Forart</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("forart_theme") || "dark";
          if (theme !== "light") document.documentElement.classList.add("theme-dark", "dark");
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/renderer/src/main.tsx"></script>
  </body>
</html>
